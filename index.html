<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百萬富翁：法國大革命挑戰賽</title>
    <style>
        :root { 
            --bg-color: #0b0e14; 
            --panel-bg: #1b2735; 
            --gold: #f1c40f; 
            --text-light: #ecf0f1; 
            --correct: #2ecc71; 
            --wrong: #e74c3c; 
            --fr-blue: #0055A4;
            --fr-white: #ffffff;
            --fr-red: #EF4135;
        }
        
        body { 
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
            background: var(--bg-color); 
            color: var(--text-light); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        .container { 
            max-width: 800px; 
            width: 100%; 
            background: #090a0f; 
            padding: 30px; 
            border-radius: 15px; 
            border-left: 2px solid var(--gold);
            border-right: 2px solid var(--gold);
            border-bottom: 2px solid var(--gold);
            border-top: 8px solid;
            border-image: linear-gradient(to right, var(--fr-blue) 33.3%, var(--fr-white) 33.3%, var(--fr-white) 66.6%, var(--fr-red) 66.6%) 1;
            text-align: center; 
            box-sizing: border-box; 
            margin-bottom: 20px; 
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.2);
        }
        
        h1 { color: var(--gold); font-size: 2.2em; margin-bottom: 10px; text-shadow: 0 0 10px rgba(241, 196, 15, 0.4); }

        .subtitle {
            font-size: 1.2em; margin-bottom: 25px;
            background: linear-gradient(to right, #4da1ff, #ffffff, #ff7a7a);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: bold; letter-spacing: 2px;
        }

        #js-status {
            background: rgba(231, 76, 60, 0.2);
            color: var(--wrong);
            border: 1px solid var(--wrong);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        .login-group { margin: 20px 0; text-align: center; }
        .login-group label { display: block; margin-bottom: 8px; color: var(--gold); font-weight: bold; font-size: 1.1em; }

        input[type="text"], input[type="password"] {
            padding: 12px; width: 80%; max-width: 300px; border-radius: 6px;
            border: 1px solid var(--gold); background: #111; color: #fff; text-align: center; font-size: 16px;
        }
        input:focus { outline: none; border-color: #4da1ff; box-shadow: 0 0 8px rgba(77, 161, 255, 0.6); }

        .btn {
            background: linear-gradient(to right, var(--fr-blue), #1e3799); color: white;
            border: 1px solid var(--gold); padding: 12px 50px; font-size: 18px; border-radius: 25px;
            cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn:hover { background: linear-gradient(to right, #0066cc, var(--fr-blue)); box-shadow: 0 0 15px rgba(255, 255, 255, 0.2); border-color: var(--fr-white); }

        .stats-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; padding-bottom: 12px; margin-bottom: 20px; font-size: 16px; }
        .question-box { font-size: 1.3em; font-weight: bold; margin-bottom: 20px; line-height: 1.5; text-align: left; color: #fff; }

        .statement-box {
            background: rgba(255, 255, 255, 0.06); border-left: 4px solid var(--fr-blue);
            padding: 15px; margin: 15px 0; border-radius: 0 8px 8px 0; font-size: 1.05em; line-height: 1.6; white-space: pre-line; text-align: left;
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }

        .option-btn {
            background: var(--panel-bg); border: 1px solid var(--gold); color: var(--text-light);
            padding: 15px; border-radius: 8px; font-size: 16px; cursor: pointer; text-align: left; transition: 0.2s;
        }
        .option-btn:hover:not(:disabled) { background: #253346; border-color: var(--fr-white); }
        .option-btn.correct { background: var(--correct) !important; color: white !important; font-weight: bold; border-color: #fff; }
        .option-btn.wrong { background: var(--wrong) !important; color: white !important; border-color: #fff; }

        .fill-box { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 20px; }
        
        .explanation-box {
            background: #152232; border: 1px solid var(--gold); border-left: 5px solid var(--fr-red);
            padding: 15px; border-radius: 8px; margin-top: 20px; text-align: left;
        }

        .lb-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 16px; }
        .lb-table th, .lb-table td { padding: 10px; border-bottom: 1px solid #333; text-align: center; }
        .lb-table th { background: var(--panel-bg); color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    
    <div id="login-screen">
        <h1>📜 法國大革命 歷史挑戰賽</h1>
        <div class="subtitle">自由 · 平等 · 博愛 (Liberté, Égalité, Fraternité)</div>
        
        <div id="js-status">
            ⚠️ 警告：遊戲邏輯載入失敗！<br>這代表您的程式碼沒有完整複製到最後一行（缺少 script 結尾）。
        </div>

        <p style="color: #aaa; margin-bottom:20px;">系統將隨機抽出 15 題選擇 ＋ 5 題填充 (共 20 題)</p>
        
        <div class="login-group">
            <label>班別及班號：</label>
            <input type="text" id="class-input" placeholder="例如: 2A15">
        </div>
        <div class="login-group">
            <label>學生姓名：</label>
            <input type="text" id="name-input" placeholder="例如: 陳大文">
        </div>
        <div class="login-group">
            <label>通關密碼：</label>
            <input type="password" id="pw-input" placeholder="請輸入老師提供的密碼">
        </div>
        
        <button class="btn" id="start-btn">開始挑戰</button>
    </div>

    <div id="quiz-screen" style="display: none;">
        <div class="stats-bar">
            <div>👤 <span id="player-info" style="color:var(--gold); font-weight:bold;"></span></div>
            <div>📝 題號: <span id="q-progress" style="color:var(--gold);">1/20</span></div>
            <div>⏱️ 時間: <span id="timer" style="color:var(--wrong); font-weight:bold;">30</span>s</div>
            <div>💰 積分: <span id="score" style="color:#2ecc71; font-weight:bold;">0</span></div>
        </div>

        <div id="question-text" class="question-box"></div>
        <div id="combo-statement" class="statement-box" style="display: none;"></div>

        <div id="mc-container" class="options-grid"></div>

        <div id="fill-container" class="fill-box" style="display: none;">
            <input type="text" id="fill-input" placeholder="請在此輸入答案 (按 Enter 提交)..." autocomplete="off">
            <button class="btn" id="submit-fill-btn" style="margin-top:0; padding: 10px 30px; background:var(--fr-red);">提交答案</button>
        </div>

        <div id="explanation-box" class="explanation-box" style="display: none;">
            <div id="explanation-text" style="line-height: 1.6;"></div>
            <button class="btn" id="next-btn" style="background:var(--correct); border:none; float:right; padding:8px 25px; font-size:16px; margin-top:10px;">下一題 ➔</button>
            <div style="clear:both;"></div>
        </div>
    </div>

    <div id="result-screen" style="display: none;">
        <h1 style="color: var(--gold);">🏆 挑戰完成！</h1>
        <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; border: 1px solid var(--gold); margin-bottom: 25px; font-size: 1.15em; line-height: 1.8;">
            <p>班別班號：<span id="res-class" style="color: var(--gold); font-weight: bold;"></span></p>
            <p>學生姓名：<span id="res-name" style="color: var(--gold); font-weight: bold;"></span></p>
            <p>答對題數：<span id="res-correct" style="color: #2ecc71; font-weight: bold;"></span> / 20 題</p>
            <p>最終得分：<span id="res-score" style="color: #f1c40f; font-weight: bold; font-size: 1.3em;"></span> 分</p>
            <p>總共用時：<span id="res-time" style="color: #e74c3c; font-weight: bold;"></span> 秒</p>
            <button class="btn" id="copy-btn" style="background:#e67e22; border:none; padding:8px 20px; font-size:15px;">📋 複製成績報告</button>
        </div>
        
        <h2 style="color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 5px; text-align:left;">🌍 雲端即時英雄榜</h2>
        <div style="max-height: 350px; overflow-y: auto; background: #090a0f; border: 1px solid #333; border-radius: 8px;">
            <table class="lb-table">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>班別</th>
                        <th>姓名</th>
                        <th>積分</th>
                        <th>用時</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                    <tr><td colspan="5" style="color:#aaa; padding:20px;">正在加載雲端排行榜...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    // 遊戲參數設定
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbz661pj4WrGEX8GAw7GYAiD8onZhD2lPnoQ-OeOHGL9EQ5ao0RvoYqqOeufPb3ky_GDYQ/exec";
    const GAME_TITLE = "法國大革命挑戰賽"; 
    const CORRECT_PW = "school2026"; 

    var studentData = { classNum: "", name: "", score: 0, correct: 0, totalTime: 0 };
    var currentQuiz = []; 
    var currentQIndex = 0;
    var timerInterval;
    var timeLeft = 0;
    var isAnswering = false;
    var quizStartTime = 0;

    var quizBank = [
        { type: "MC", q: "政治革命的主要目的是甚麼？", o: ["推動對外戰爭", "宣揚宗教信仰", "推翻現有體制，建立新制度", "改善國家財政"], a: 2, e: "政治革命是由人民發起的行動，屬於「由下而上」的體制變革，旨在建立新制度。" },
        { type: "MC", q: "1643至1715年間管治法國，並被稱為「太陽王」的君主是誰？", o: ["路易十六", "拿破崙", "路易十五", "路易十四"], a: 3, e: "在1643-1715年間管治法國的「太陽王」是路易十四。" },
        { type: "MC", q: "路易十四為了加強統治，特別修建了哪一座宮殿？", o: ["凡爾賽宮", "白金漢宮", "羅浮宮", "楓丹白露宮"], a: 0, e: "路易十四修建了奢華的凡爾賽宮以凝聚貴族並彰顯至高無上的王權。" },
        { type: "MC", q: "大革命爆發前夕，法國國王疏於朝政且王后揮霍無度，這位國王是誰？", o: ["威廉一世", "路易十六", "路易十四", "伊曼紐二世"], a: 1, e: "大革命爆發前，法國的專制君主是路易十六。" },
        { type: "MC", q: "法國封建制度下的「第一等級」主要是指甚麼人？", o: ["貴族", "平民", "教士", "軍人"], a: 2, e: "第一等級為教士，第二等級為貴族，第三等級為平民。" },
        { type: "MC", q: "在舊有社會制度下，佔法國人口多數的基層群眾面臨甚麼困境？", o: ["承擔所有賦稅並缺乏政治發言權", "被迫移居海外殖民地", "需無償為貴族提供軍事服務", "被禁止參與任何宗教活動"], a: 0, e: "第三等級平民需要承擔國家所有的賦稅，但在政治上完全缺乏發言權。" },
        { type: "MC", q: "法國在1780年代遭遇甚麼事件，進一步加劇了國家的財政困難？", o: ["傳染病爆發", "軍隊叛變", "外敵入侵", "天災"], a: 3, e: "1780年代法國連續遭遇天災，導致農作物失收，使財政和物資陷入困境。" },
        { type: "MC", q: "哪一場運動的思想主張促使法國民眾決心反抗不公義的政府？", o: ["啟蒙運動", "文藝復興", "宗教改革", "工業革命"], a: 0, e: "18世紀的啟蒙運動提倡理性、自由與平等，深遠地啟發了法國民眾反抗專制。" },
        { type: "MC", q: "法國曾派兵參與哪一場戰爭，令平等及自由的思想傳返國內並鼓舞了民眾？", o: ["普丹戰爭", "美國獨立戰爭", "普法戰爭", "普奧戰爭"], a: 1, e: "法國派兵支援美國獨立戰爭，戰爭獲勝後將平等及自由的思想帶回法國。" },
        { type: "MC", q: "1789年5月，為了解決財政危機而召開的會議名稱為？", o: ["督政府會議", "國民議會", "三級議會", "維也納會議"], a: 2, e: "為解決嚴重的財政崩潰，路易十六被迫重新召開了停開百年的三級議會。" },
        { type: "MC", q: "因稅制改革建議被否決，基層代表退出原有會議並另組了甚麼機構？", o: ["督政府", "神聖同盟", "第一共和", "國民議會"], a: 3, e: "第三等級代表退出三級議會，宣布成立代表全體人民的「國民議會」。" },
        { type: "MC", q: "1791年10月，國王出走失敗並承認憲法後，法國的政體轉變為？", o: ["君主立憲", "絕對君主制", "民主共和", "聯邦制"], a: 0, e: "國王權力開始受到憲法嚴格約束，法國此時正式成為君主立憲國家。" },
        { type: "MC", q: "1792年4月，哪兩個國家進攻法國以試圖制止大革命的蔓延？", o: ["英國、俄羅斯", "奧地利、俄羅斯", "奧地利、普魯士", "普魯士、英國"], a: 2, e: "因害怕大革命和自由思想蔓延，奧地利與普魯士聯合發兵進攻法國。" },
        { type: "MC", q: "1793年，被裁定叛國罪的法國國王路易十六面臨了甚麼歷史性的下場？", o: ["流放至愛爾巴島", "送上斷頭台處死", "終身監禁", "褫奪王位成為平民"], a: 1, e: "共和成立後，路易十六被控叛國並送上斷頭台處死，標誌波旁封建王朝結束。" },
        { type: "MC", q: "1794年7月，哪位領導人的被捕及處決標誌著激進統治時期的結束？", o: ["羅伯斯比爾", "拿破崙", "路易十六", "加富爾"], a: 0, e: "恐怖時代由羅伯斯比爾領導，其於1794年7月被捕處決宣告了該時期結束。" },
        { type: "MC", q: "1795至1799年間，未能擊退反法同盟且施政無能的法國政權是？", o: ["第一共和", "國民議會", "神聖同盟", "督政府"], a: 3, e: "恐怖時代結束後成立了督政府，其無能為拿破崙的軍事崛起開闢了道路。" },
        { type: "MC", q: "結束了長達十年的法國大革命，並逐步實行專政的人物是誰？", o: ["路易十八", "拿破崙", "羅伯斯比爾", "俾斯麥"], a: 1, e: "1799年11月拿破崙推翻督政府並逐步實行專政，標誌法國大革命正式告終。" },
        { type: "MC", q: "法國大革命最著名的口號是甚麼？", o: ["民族、民權、民生", "和平、土地、麵包", "自由、平等、博愛", "獨立、統一、富強"], a: 2, e: "「自由、平等、博愛」是法國大革命最核心的口號。" },
        { type: "MC", q: "主張人生而自由、平等，並有權推翻專制體制的思潮是？", o: ["共產主義", "帝國主義", "民族主義", "自由主義"], a: 3, e: "這是自由主義的核心主張。" },
        { type: "MC", q: "關於法國大革命後歐洲歷史發展的描述，下列哪一項是正確的？", o: ["1858年歐洲各地爆發多場大規模革命", "普魯士得到意大利的援助才成功統一", "意大利及德國先後於1870年及1871年完成統一", "法國積極協助兩國完成統一"], a: 2, e: "意、德分別於1870與1871完成統一；歐洲革命為1848年；法國是統一的障礙而非協助者。" },
        { type: "MC", q: "十九世紀初，甚麼客觀形勢讓法國人對自身身分感到自豪，導致民族情緒高漲？", o: ["拿破崙稱霸歐洲", "波旁王朝復辟", "路易十四積極擴張", "頒布權利宣言"], a: 0, e: "拿破崙稱霸歐洲的軍事勝利，極大激發了法國人民的民族自豪感。" },
        { type: "MC", q: "自由主義與民族主義主要是透過甚麼歷史事件廣泛傳播至歐洲各地？", o: ["啟蒙運動及美國獨立戰爭", "維也納會議及神聖同盟", "拿破崙戰爭及拿破崙法典", "工業革命及貿易擴張"], a: 2, e: "拿破崙的對外戰爭及推行法典，無意中將革命思潮廣播歐洲各地。" },
        { type: "MC", q: "在德意志統一運動中，普魯士首相俾斯麥積極推行甚麼政策，主張依靠軍隊和戰爭來解決統一問題？", o: ["門戶開放政策", "鐵血政策", "大陸封鎖政策", "自由放任政策"], a: 1, e: "俾斯麥奉行「鐵血政策」，主張以強硬的軍事手段完成統一。" },
        { type: "MC", q: "表達對所屬族群的效忠，並渴求獨立自主的感情，屬於哪一種思潮？", o: ["民族主義", "自由主義", "共產主義", "帝國主義"], a: 0, e: "渴求擺脫外族統治、建立民族國家的情感即為民族主義。" },
        { type: "MC", q: "1814-15年舉行的重要國際會議，其主要目標之一是甚麼？", o: ["協助意大利統一", "遏止自由主義和民族主義的傳播", "推廣法典", "支持法國再度擴張"], a: 1, e: "維也納會議是保守派主導，核心目標是遏止革命思潮、恢復舊秩序。" },
        { type: "MC", q: "1830年代及1848年歐洲爆發多場起義，當中唯一成功獨立的是哪一國？", o: ["德國", "意大利", "比利時", "奧地利"], a: 2, e: "在十九世紀中葉的革命浪潮中，比利時是少數成功爭取獨立的國家。" },
        { type: "MC", q: "在意大利統一運動中，帶領「紅衫軍」的主要領袖是誰？", o: ["加富爾", "伊曼紐二世", "俾斯麥", "加里波的"], a: 3, e: "加里波的帶領紅衫軍征服意大利南部，為統一作出重大貢獻。" },
        { type: "MC", q: "在德意志統一的過程中，扮演普魯士國王並領導統一運動的君主是哪一位？", o: ["拿破崙", "俾斯麥", "威廉一世", "加富爾"], a: 2, e: "威廉一世是普魯士國王，後加冕為德意志帝國首任皇帝。" },

    // 初始化與事件綁定 (取代原本寫在 HTML 裡的 onclick/onkeydown)
    document.addEventListener("DOMContentLoaded", function() {
        // 隱藏紅色警告牌 (如果這行執行了，代表 JS 成功載入)
        var statusAlert = document.getElementById('js-status');
        if (statusAlert) statusAlert.style.display = 'none';

        // 綁定輸入框 Enter 鍵
        var inputs = document.querySelectorAll('#login-screen input');
        for (var i = 0; i < inputs.length; i++) {
            inputs[i].addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.keyCode === 13) startQuiz();
            });
        }
        
        // 綁定所有按鈕
        document.getElementById('start-btn').addEventListener('click', startQuiz);
        document.getElementById('submit-fill-btn').addEventListener('click', submitFillAnswer);
        document.getElementById('next-btn').addEventListener('click', nextQuestion);
        document.getElementById('copy-btn').addEventListener('click', copyResult);
        
        // 綁定填充題 Enter 鍵
        document.getElementById('fill-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.keyCode === 13) {
                e.preventDefault();
                submitFillAnswer();
            }
        });
    });

    function shuffleArray(array) {
        var currentIndex = array.length, temporaryValue, randomIndex;
        while (0 !== currentIndex) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex -= 1;
            temporaryValue = array[currentIndex];
            array[currentIndex] = array[randomIndex];
            array[randomIndex] = temporaryValue;
        }
        return array;
    }

    function startQuiz() {
        var classInput = document.getElementById('class-input').value.replace(/^\s+|\s+$/g, '');
        var nameInput = document.getElementById('name-input').value.replace(/^\s+|\s+$/g, '');
        var inputPw = document.getElementById('pw-input').value.replace(/^\s+|\s+$/g, '');
        
        if (!classInput || !nameInput) {
            alert("⚠️ 請輸入班別班號及學生姓名！");
            return;
        }

        if (inputPw.toLowerCase() !== CORRECT_PW.toLowerCase()) {
            alert("❌ 密碼錯誤！請向老師確認正確的密碼。");
            return;
        }

        var mcPool = [];
        var fillPool = [];
        
        for (var i = 0; i < quizBank.length; i++) {
            if (quizBank[i].type === "MC" || quizBank[i].type === "COMBO") {
                mcPool.push(quizBank[i]);
            } else {
                fillPool.push(quizBank[i]);
            }
        }

        mcPool = shuffleArray(mcPool).slice(0, 15);
        fillPool = shuffleArray(fillPool).slice(0, 5);
        currentQuiz = mcPool.concat(fillPool);

        studentData.classNum = classInput;
        studentData.name = nameInput;

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        document.getElementById('player-info').innerText = studentData.classNum + " " + studentData.name;
        
        currentQIndex = 0;
        studentData.score = 0;
        studentData.correct = 0;
        quizStartTime = new Date().getTime();

        loadQuestion();
    }

    function loadQuestion() {
        if (currentQIndex >= currentQuiz.length) { endGame(); return; }
        
        isAnswering = true;
        document.getElementById('explanation-box').style.display = 'none';
        document.getElementById('q-progress').innerText = (currentQIndex + 1) + " / " + currentQuiz.length;
        document.getElementById('score').innerText = studentData.score;
        
        var qData = currentQuiz[currentQIndex];
        document.getElementById('question-text').innerText = qData.q;

        if (qData.type === "MC" || qData.type === "COMBO") {
            document.getElementById('mc-container').style.display = 'grid';
            document.getElementById('fill-container').style.display = 'none';
            
            var comboBlock = document.getElementById('combo-statement');
            if (qData.type === "COMBO") {
                comboBlock.innerText = qData.combo;
                comboBlock.style.display = 'block';
            } else {
                comboBlock.style.display = 'none';
            }

            var mcContainer = document.getElementById('mc-container');
            mcContainer.innerHTML = '';
            
            for (var idx = 0; idx < qData.o.length; idx++) {
                (function(index) {
                    var opt = qData.o[index];
                    var btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerHTML = '<b>' + String.fromCharCode(65 + index) + '.</b> ' + opt;
                    btn.onclick = function() { checkMCAnswer(index); };
                    mcContainer.appendChild(btn);
                })(idx);
            }
            timeLeft = 30;
        } else {
            document.getElementById('mc-container').style.display = 'none';
            document.getElementById('combo-statement').style.display = 'none';
            document.getElementById('fill-container').style.display = 'flex';
            
            var fInput = document.getElementById('fill-input');
            fInput.value = '';
            fInput.disabled = false;
            fInput.style.background = '#111';
            fInput.focus();
            timeLeft = 40;
        }

        document.getElementById('timer').innerText = timeLeft;
        clearInterval(timerInterval);
        timerInterval = setInterval(countdown, 1000);
    }

    function countdown() {
        if (!isAnswering) return;
        timeLeft--;
        document.getElementById('timer').innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            var qData = currentQuiz[currentQIndex];
            if (qData.type === "FILL") {
                showFillResult(false);
            } else {
                showMCResult(-1);
            }
        }
    }

    function checkMCAnswer(selectedIdx) {
        if (!isAnswering) return;
        isAnswering = false;
        clearInterval(timerInterval);
        showMCResult(selectedIdx);
    }

    function showMCResult(selectedIdx) {
        var qData = currentQuiz[currentQIndex];
        var buttons = document.querySelectorAll('.option-btn');
        for (var i = 0; i < buttons.length; i++) {
            buttons[i].disabled = true;
        }

        var isCorrect = (selectedIdx === qData.a);
        if (selectedIdx !== -1) {
            buttons[selectedIdx].classList.add(isCorrect ? 'correct' : 'wrong');
        }
        buttons[qData.a].classList.add('correct');

        if (isCorrect) {
            studentData.correct++;
            studentData.score += 100 + (timeLeft * 2);
        }

        var resultPrefix = isCorrect ? "<div style='color:var(--correct); font-size:1.3em; margin-bottom:10px;'>✅ 答對了！</div>" : "<div style='color:var(--wrong); font-size:1.3em; margin-bottom:10px;'>❌ 答錯了！</div>";
        document.getElementById('explanation-text').innerHTML = resultPrefix + qData.e;
        document.getElementById('explanation-box').style.display = 'block';
    }

    function submitFillAnswer() {
        if (!isAnswering) return;
        var userAns = document.getElementById('fill-input').value.replace(/^\s+|\s+$/g, '');
        if (userAns === "") return; 
        
        isAnswering = false;
        clearInterval(timerInterval);

        var qData = currentQuiz[currentQIndex];
        var isCorrect = false;
        for (var i = 0; i < qData.a.length; i++) {
            var ans = qData.a[i];
            if (userAns === ans || userAns.toLowerCase() === ans.toLowerCase()) {
                isCorrect = true;
                break;
            }
        }
        showFillResult(isCorrect);
    }

    function showFillResult(isCorrect) {
        var qData = currentQuiz[currentQIndex];
        var fInput = document.getElementById('fill-input');
        fInput.disabled = true;

        if (isCorrect) {
            fInput.style.background = '#1b5e20'; 
            studentData.correct++;
            studentData.score += 100 + (timeLeft * 2);
        } else {
            fInput.style.background = '#b71c1c'; 
            if(fInput.value === '') fInput.value = "回答超時！";
        }

        var resultPrefix = isCorrect ? "<div style='color:var(--correct); font-size:1.3em; margin-bottom:10px;'>✅ 答對了！</div>" : "<div style='color:var(--wrong); font-size:1.3em; margin-bottom:10px;'>❌ 答錯了！</div>";
        document.getElementById('explanation-text').innerHTML = resultPrefix + '正確答案為：<b>' + qData.a.join(' 或 ') + '</b><br><br>' + qData.e;
        document.getElementById('explanation-box').style.display = 'block';
    }

    function nextQuestion() {
        currentQIndex++;
        loadQuestion();
    }

    function endGame() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        studentData.totalTime = Math.round((new Date().getTime() - quizStartTime) / 1000);

        document.getElementById('res-class').innerText = studentData.classNum;
        document.getElementById('res-name').innerText = studentData.name;
        document.getElementById('res-correct').innerText = studentData.correct;
        document.getElementById('res-score').innerText = studentData.score;
        document.getElementById('res-time').innerText = studentData.totalTime;

        uploadScore();
        setTimeout(loadLeaderboard, 1500);
    }

    function uploadScore() {
        var params = "class=" + encodeURIComponent(studentData.classNum) +
                     "&classStr=" + encodeURIComponent(studentData.classNum) +
                     "&name=" + encodeURIComponent(studentData.name) +
                     "&score=" + studentData.score +
                     "&time=" + studentData.totalTime +
                     "&gameTitle=" + encodeURIComponent(GAME_TITLE) +
                     "&action=submit";

        fetch(CLOUD_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params
        }).then(function() {
            console.log("✅ 成績上傳成功");
        }).catch(function(err) {
            console.error("❌ 上傳異常:", err);
        });
    }

    function loadLeaderboard() {
        var tbody = document.getElementById('leaderboard-body');
        var callbackName = "jsonp_callback_" + Math.round(100000 * Math.random());
        
        window[callbackName] = function(data) {
            tbody.innerHTML = "";
            if (data && data.error) {
                tbody.innerHTML = "<tr><td colspan='5' style='color:var(--wrong);'>⚠️ 後台錯誤: " + data.error + "</td></tr>";
            } else if (!data || data.length === 0) {
                tbody.innerHTML = "<tr><td colspan='5'>目前暫無排名，你就是第一位挑戰者！</td></tr>";
            } else {
                for (var i = 0; i < data.length; i++) {
                    var tr = document.createElement('tr');
                    var isTopRank = (i < 3) ? "color: var(--gold); font-weight: bold;" : "";
                    var cStr = data[i].classStr || data[i].class || "";
                    var nStr = data[i].name || "";
                    var sStr = data[i].score || 0;
                    var tStr = data[i].time || 0;
                    
                    tr.innerHTML = '<td style="' + isTopRank + '">' + (i + 1) + '</td>' +
                                   '<td>' + cStr + '</td>' +
                                   '<td>' + nStr + '</td>' +
                                   '<td style="color:#2ecc71; font-weight:bold;">' + sStr + '</td>' +
                                   '<td>' + tStr + '秒</td>';
                    tbody.appendChild(tr);
                }
            }
            delete window[callbackName];
            scr.remove();
        };

        var scr = document.createElement('script');
        scr.src = CLOUD_URL + "?gameTitle=" + encodeURIComponent(GAME_TITLE) + "&callback=" + callbackName;
        document.body.appendChild(scr);
    }

    function copyResult() {
        var text = "🏆 " + GAME_TITLE + "成績報告\n" +
                   "班別班號：" + studentData.classNum + "\n" +
                   "學生姓名：" + studentData.name + "\n" +
                   "答對題數：" + studentData.correct + " / 20 題\n" +
                   "最終積分：" + studentData.score + " 分\n" +
                   "總共用時：" + studentData.totalTime + " 秒\n" +
                   "繼續加油！💪";
                   
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(function() {
                alert("📋 成績報告已成功複製到剪貼簿！");
            }).catch(function() {
                alert("複製失敗，請手動選取文字進行複製。");
            });
        } else {
            alert("瀏覽器不支援自動複製，以下為您的成績報告，請手動選取複製：\n\n" + text);
        }
    }
</script>
</body>
</html>
